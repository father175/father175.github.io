<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8">
		<link rel="shortcut icon" href="icon.jpg">
		<title>JS实践</title>
		<script>
			function dcookie(){
				var name=document.getElementById("name").value;
				var password=document.getElementById("password").value;
				var  login = document.cookie;
				login = login.split('=');
				if(name==""){
					document.getElementById('return').innerHTML='请填写用户名';
				}else if(password==""){
					document.getElementById('return').innerHTML='请填写密码';
				}else if(login[0]==window.btoa(name)&&login[1]==window.btoa(password)){
					document.getElementById('return').innerHTML='欢迎回来，游客'+name;
				}else{
					alert('read:'+document.cookie);
					document.cookie = window.btoa(name)+'='+window.btoa(password);
					alert('want:'+window.btoa(name)+'='+window.btoa(password)+'\n'+'input:'+document.cookie);
					document.getElementById('return').innerHTML='游客'+name+'已登录';
				}
			}
		</script>
		<style>
			@font-face {
			    font-family: "MC";
			    src:url("Minecraft.ttf");
			    font-weight: normal;
			    font-style: normal;
			}
			p {
				font-family: "MC";
				text-align: center;
				font-size: 50px;
				color: yellowgreen;
			}
			input {
				font-family: "MC";
				width: 300px;
				border-radius:5px;
				position: absolute;
				font-size: 25px;
			}
			button {
				border-radius:5px;
				position: absolute;
				font-size: 25px;
			}
			#name{
				left: 625px;
				top: 150px;
			}
			#password{
				left: 625px;
				top: 200px;
			}
			#submit{
				left: 625px;
				top: 250px;
				width: 300px;
				background-color: blue;
				color: white;
				border: 2px solid blue;
				transition-duration: 0.5s;
			}
			#submit:hover {
			    background-color: white;
			    color: blue;
			}
		</style>
	</head>
	<body>
		<p>cookie实践</p>
		<input type="text" placeholder="用户名" id="name" autocomplete="off"/>
		<input type="password" placeholder="密码" id="password" autocomplete="off"/>
		<button type="submit" id="submit" onclick="dcookie()">提交</button>
		<br>
		<br>
		<br>
		<br>
		<br>
		<p id="return">控制台</p>
	</body>
</html>
